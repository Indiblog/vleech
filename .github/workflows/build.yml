name: Build and Publish Plugins

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"

      - name: Clean previous .cs3 artifacts
        run: |
          rm -f $GITHUB_WORKSPACE/builds/*.cs3 || true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x $GITHUB_WORKSPACE/src/gradlew

      - name: Build all 6 plugins + generate updater.json
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd $GITHUB_WORKSPACE/src
          ./gradlew make makePluginsJson

      - name: Copy .cs3 artifacts to builds branch
        run: |
          cp $GITHUB_WORKSPACE/src/**/build/*.cs3 $GITHUB_WORKSPACE/builds/ || true

      - name: Copy updater.json (plugins.json) to builds branch
        run: |
          cp $GITHUB_WORKSPACE/src/build/plugins.json $GITHUB_WORKSPACE/builds/plugins.json

      - name: Generate repo.json manifest for CloudStream shortcode
        run: |
          cat > $GITHUB_WORKSPACE/builds/repo.json << 'EOF'
          {
            "name": "vleech",
            "description": "6 Indian & English streaming providers for CloudStream",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/${{ github.repository }}/builds/plugins.json"
            ]
          }
          EOF

      - name: Commit and push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name  "GitHub Actions"
          git add .
          git commit --amend -m "Build $GITHUB_SHA" || exit 0
          git push --force
